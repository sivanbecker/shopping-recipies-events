<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f97316" />
    <meta name="description" content="Shopping lists, recipes, and family event management" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Shop Cook Host" />

    <!-- Rubik font — supports Hebrew + Latin perfectly -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />

    <title>Shopping · Recipes · Events</title>
    <!-- FOUC prevention: apply theme attributes before first paint -->
    <script>
      ;(function () {
        var state = {}
        try { state = JSON.parse(localStorage.getItem('app-store') || '{}').state || {} } catch (e) {}
        var html = document.documentElement

        // Preset
        html.setAttribute('data-preset', state.uiPreset || 'classic')

        // Background
        html.setAttribute('data-background', state.appBackground || 'white')

        // Text scale
        html.setAttribute('data-text-scale', state.textScale || 'md')

        // Dark mode
        var mode = state.themeMode || (state.isDarkMode === true ? 'dark' : 'system')
        var dark = mode === 'dark' || (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) html.classList.add('dark')

        // Advanced mode: inject custom accent ramp before first paint
        if (state.appearanceMode === 'advanced' && state.customAccentColor) {
          var hex = state.customAccentColor.replace('#', '')
          if (hex.length === 6) {
            var r = parseInt(hex.slice(0, 2), 16) / 255
            var g = parseInt(hex.slice(2, 4), 16) / 255
            var b = parseInt(hex.slice(4, 6), 16) / 255
            var max = Math.max(r, g, b), min = Math.min(r, g, b)
            var l = (max + min) / 2
            var s = max === min ? 0 : l > 0.5 ? (max - min) / (2 - max - min) : (max - min) / (max + min)
            var h = 0
            if (max !== min) {
              if (max === r) h = ((g - b) / (max - min) + (g < b ? 6 : 0)) / 6
              else if (max === g) h = ((b - r) / (max - min) + 2) / 6
              else h = ((r - g) / (max - min) + 4) / 6
            }
            var hDeg = Math.round(h * 360), sPct = Math.round(s * 100)
            var stops = [['50',97],['100',93],['200',85],['300',75],['400',63],['500',52],['600',43],['700',35],['800',27],['900',20],['950',13]]
            for (var i = 0; i < stops.length; i++) {
              html.style.setProperty('--brand-' + stops[i][0], 'hsl(' + hDeg + ' ' + sPct + '% ' + stops[i][1] + '%)')
            }
          }
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
